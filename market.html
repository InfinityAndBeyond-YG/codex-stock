<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주식현재가 | Stock Flow</title>
    <meta
      name="description"
      content="보유 종목과 관심 종목 현재가를 확인하는 Stock Flow 페이지"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260324-14" />
    <script defer src="./market.js?v=20260324-07"></script>
  </head>
  <body>
    <div class="page-glow page-glow-one"></div>
    <div class="page-glow page-glow-two"></div>

    <div class="app-shell">
      <header class="page-header">
        <a href="./index.html" class="eyebrow-link">
          <p class="eyebrow">Stock Flow</p>
        </a>
        <div class="header-actions" aria-label="상단 기능 버튼">
          <a href="./market.html" class="header-action-button active" aria-current="page">주식현재가</a>
          <a href="./balance.html" class="header-action-button">주식잔고</a>
          <a href="./upload.html" class="header-action-button">내 주식 올리기</a>
        </div>
      </header>

      <main class="page-stack">
        <section class="panel hero-panel">
          <p class="section-kicker">Market Page</p>
          <div class="hero-title-row">
            <h1 class="market-page-title">주식현재가</h1>
            <div class="hero-market-statuses">
              <span id="heroKrStatus" class="live-market-pill">-</span>
              <span id="heroUsStatus" class="live-market-pill live-market-pill-us">-</span>
            </div>
          </div>

          <div class="market-top-row">
            <div class="market-controls">
              <label class="market-search">
                <span>종목 검색</span>
                <input
                  id="marketSearchInput"
                  type="search"
                  inputmode="search"
                  placeholder="삼성전자, NVIDIA, Tesla"
                  autocomplete="off"
                />
              </label>
            </div>
            <div class="market-favorite-tab-wrap">
              <button
                type="button"
                id="favoriteTabButton"
                class="favorite-tab-button"
                aria-expanded="false"
                aria-controls="favoritePanel"
              >
                <span>즐겨찾기</span>
                <strong id="favoriteCountBadge" class="favorite-count-badge">0</strong>
              </button>
            </div>
          </div>

          <div class="market-dropdown-row">
            <div class="market-dropdown-spacer" aria-hidden="true"></div>
            <div id="favoritePanel" class="favorite-panel"></div>
          </div>

          <div id="marketSearchResults" class="market-search-results"></div>

          <div class="market-stage-grid">
            <div class="live-chart-shell">
              <div class="chart-summary">
                <div class="chart-summary-copy">
                  <p class="section-kicker">Selected Stock</p>
                  <div class="chart-headline-row">
                    <h2 id="chartStockName">-</h2>
                    <div id="chartDetailStats" class="chart-detail-inline"></div>
                  </div>
                  <p id="chartStockMeta" class="section-caption">-</p>
                </div>
                <div class="chart-price-stack">
                  <strong id="chartStockPrice">-</strong>
                  <span id="chartStockChange" class="change-pill positive">-</span>
                </div>
              </div>

              <div id="chartRangeSwitch" class="chart-range-switch">
                <button type="button" class="chart-range-chip active" data-chart-range="1D">1일</button>
                <button type="button" class="chart-range-chip" data-chart-range="1W">1주</button>
                <button type="button" class="chart-range-chip" data-chart-range="1M">1달</button>
                <button type="button" class="chart-range-chip" data-chart-range="1Y">1년</button>
                <button type="button" class="chart-range-chip" data-chart-range="3Y">3년</button>
                <button type="button" class="chart-range-chip" data-chart-range="5Y">5년</button>
                <button type="button" class="chart-range-chip" data-chart-range="10Y">10년</button>
                <button type="button" class="chart-range-chip" data-chart-range="ALL">전체</button>
              </div>

              <div class="chart-canvas">
                <div class="chart-body">
                  <svg id="marketChart" class="market-chart-svg" viewBox="0 0 640 240" preserveAspectRatio="none"></svg>
                  <div id="chartPriceScale" class="chart-price-scale"></div>
                </div>
                <div id="chartAxisLabels" class="chart-axis-labels"></div>
              </div>
            </div>

            <section class="panel side-panel market-side-panel market-inline-board">
              <div class="panel-head panel-head-tight market-board-head">
                <div>
                  <p class="section-kicker">Volume Board</p>
                  <h2 id="marketBoardTitle">거래량 순위</h2>
                </div>
                <p id="marketBoardCaption" class="section-caption">-</p>
              </div>

              <div id="marketRankingList" class="market-ranking-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
