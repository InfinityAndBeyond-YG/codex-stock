<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Flow Layout</title>
    <meta
      name="description"
      content="주식 자산 비율 구조를 먼저 보는 Stock Flow 레이아웃 시안"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260324-21" />
    <script defer src="./app.js?v=20260324-13"></script>
  </head>
  <body>
    <div class="page-glow page-glow-one"></div>
    <div class="page-glow page-glow-two"></div>

    <div class="app-shell">
      <header class="page-header">
        <a href="./index.html" class="eyebrow-link">
          <p class="eyebrow">Stock Flow</p>
        </a>
        <div class="header-actions" aria-label="상단 기능 버튼">
          <a href="./market.html" class="header-action-button">주식현재가</a>
          <a href="./balance.html" class="header-action-button">주식잔고</a>
          <a href="./upload.html" class="header-action-button">내 주식 올리기</a>
        </div>
      </header>

      <main class="stage-grid">
        <section class="left-stage">
          <article class="panel avg-panel">
            <p class="section-kicker">자산 요약</p>
            <div class="avg-layout">
              <div class="summary-metric-block">
                <div class="summary-title-row">
                  <h2>총 평가 자산</h2>
                  <div class="currency-toggle" id="summaryCurrencyToggle">
                    <button type="button" class="currency-chip active" data-display-currency="KRW">₩</button>
                    <button type="button" class="currency-chip" data-display-currency="USD">$</button>
                  </div>
                </div>
                <div class="summary-value-row">
                  <strong id="avgCostValue" class="avg-value">-</strong>
                  <p id="exchangeRateValue" class="exchange-rate-meta">-</p>
                </div>
              </div>
              <div class="summary-metric-block">
                <div class="summary-title-row summary-title-row-solo">
                  <h2>현금 자산</h2>
                  <span class="summary-title-spacer" aria-hidden="true"></span>
                </div>
                <div class="metric-inline-row">
                  <strong id="cashKrwValue" class="avg-value">-</strong>
                  <p id="cashKrwPercent" class="summary-meta">-</p>
                </div>
              </div>
            </div>

            <div class="inline-donut">
              <div class="panel-head compact-panel-head">
                <div>
                  <p class="section-kicker">자산 비율</p>
                  <h2 id="allocationTitle">전체 자산 비율</h2>
                </div>
                <p id="allocationDescription" class="section-caption">-</p>
              </div>

              <div class="donut-layout">
                <div class="donut-wrap">
                  <div id="donutChart" class="donut-chart">
                    <div id="donutPercentLayer" class="donut-percent-layer"></div>
                    <div class="donut-hole">
                      <span id="donutModeLabel" class="donut-mode">-</span>
                      <strong id="donutCenterValue" class="donut-center-value">-</strong>
                      <small id="donutCenterMeta" class="donut-center-meta">-</small>
                    </div>
                  </div>
                  <div id="donutLegend" class="donut-legend"></div>
                </div>
              </div>
            </div>
          </article>
        </section>

        <aside class="panel right-stage">
          <div class="panel-head panel-head-tight">
            <div>
              <p class="section-kicker">Right Selector</p>
              <h2>보기 선택</h2>
            </div>
            <p class="section-caption">
              여기서 전체 보기, 계좌별, 주식별 기준을 고릅니다.
            </p>
          </div>

          <div class="mode-switch" id="modeSwitch">
            <button type="button" class="mode-chip active" data-mode="overall">
              전체 보기
            </button>
            <button type="button" class="mode-chip" data-mode="accounts">
              계좌별
            </button>
            <button type="button" class="mode-chip" data-mode="stocks">
              주식별
            </button>
          </div>

          <div class="selector-copy">
            <strong id="selectorTitle">전체 자산 보기</strong>
            <p id="selectorDescription">
              전체 자산 기준으로 현금, 국내주식, 해외주식, 통화 자산 구성을 봅니다.
            </p>
          </div>

          <div id="selectorList" class="selector-list"></div>
        </aside>
      </main>

      <section class="panel history-panel">
        <div class="panel-head">
          <div>
            <p class="section-kicker">12 Month Flow</p>
            <h2>월별 평균 전체 자산</h2>
          </div>
        </div>

        <div class="history-chart-shell">
          <div id="monthlyAssetChart" class="history-chart"></div>
        </div>
      </section>
    </div>
  </body>
</html>
