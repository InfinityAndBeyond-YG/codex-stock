<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주식 리포트 | Stock Flow</title>
    <meta
      name="description"
      content="종목별 분석 메모를 정리하는 Stock Flow 주식 리포트 페이지"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260324-26" />
    <script defer src="./report.js?v=20260324-01"></script>
  </head>
  <body>
    <div class="page-glow page-glow-one"></div>
    <div class="page-glow page-glow-two"></div>

    <div class="app-shell">
      <header class="page-header">
        <a href="./index.html" class="eyebrow-link">
          <p class="eyebrow">Stock Flow</p>
        </a>
        <div class="header-actions" aria-label="상단 기능 버튼">
          <a href="./index.html" class="header-action-button home-button" aria-label="홈">🏠</a>
          <a href="./market.html" class="header-action-button">주식현재가</a>
          <a href="./report.html" class="header-action-button active" aria-current="page">주식 리포트</a>
          <a href="./balance.html" class="header-action-button">주식잔고</a>
          <a href="./upload.html" class="header-action-button">내 주식 올리기</a>
        </div>
      </header>

      <main class="page-stack">
        <section class="panel hero-panel">
          <p class="section-kicker">Report Page</p>
          <h1>주식 리포트</h1>
          <p class="hero-copy">
            종목별 분석글과 투자 메모를 한 곳에서 정리하고 확인하는 페이지입니다.
          </p>

          <div class="quick-stats">
            <article class="quick-stat-card">
              <span>전체 종목</span>
              <strong id="reportTotalCount">-</strong>
              <p>리포트 관리 대상 종목 수</p>
            </article>
            <article class="quick-stat-card">
              <span>작성된 메모</span>
              <strong id="reportSavedCount">-</strong>
              <p>저장된 종목 리포트 수</p>
            </article>
            <article class="quick-stat-card">
              <span>시장 구성</span>
              <strong id="reportMarketMix">-</strong>
              <p>한국주식 · 미국주식 기준</p>
            </article>
          </div>
        </section>

        <section class="page-grid-two">
          <article class="panel page-panel">
            <div class="panel-head">
              <div>
                <p class="section-kicker">Report List</p>
                <h2>종목 선택</h2>
              </div>
              <p class="section-caption">종목을 누르면 오른쪽 리포트 편집창이 바뀝니다.</p>
            </div>

            <div id="reportStockList" class="selector-list"></div>
          </article>

          <article class="panel page-panel">
            <div class="panel-head">
              <div>
                <p class="section-kicker">Stock Report</p>
                <h2 id="reportPageTitle">주식 리포트</h2>
              </div>
              <p id="reportPageMeta" class="section-caption">-</p>
            </div>

            <label class="stock-report-field">
              <span>분석 메모</span>
              <textarea
                id="reportPageEditor"
                class="stock-report-editor"
                placeholder="여기에 종목 분석, 투자 포인트, 리스크, 체크할 일정 등을 적어둘 수 있습니다."
              ></textarea>
            </label>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
